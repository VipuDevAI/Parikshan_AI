services:
  # Web Service
  - type: web
    name: prashnakosh
    runtime: node
    plan: free  # Change to 'starter' for production
    buildCommand: npm install && npm run db:push && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Must be set manually in Render dashboard
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 5000

databases:
  # PostgreSQL Database (optional - can also use external DB)
  - name: prashnakosh-db
    plan: free  # Change to 'starter' for production
    databaseName: prashnakosh
    user: prashnakosh_user

# Optional: If you need Redis for sessions
# - name: prashnakosh-redis
#   plan: free
